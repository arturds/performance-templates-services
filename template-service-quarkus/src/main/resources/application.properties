quarkus.application.name=template-service

# HTTP
quarkus.http.port=9090
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*

# Datasource (default: docker-compose network)
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=example
quarkus.datasource.jdbc.url=jdbc:mysql://db-mysql:3306/db
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.jdbc.min-size=10

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.jdbc.statement-batch-size=50

# OpenAPI / Swagger (same paths as Spring project)
quarkus.smallrye-openapi.path=/v3/api-docs
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.filter=com.example.template.config.OpenApiConfig

# Health (Spring Actuator compatible path on main port)
quarkus.smallrye-health.root-path=/actuator/health
quarkus.smallrye-health.management.enabled=false

# REST Client
quarkus.rest-client.google-client.url=https://www.google.com.br/
quarkus.rest-client.google-client.connect-timeout=600000
quarkus.rest-client.google-client.read-timeout=600000

# Container image (build with -Ddocker or -Dquarkus.container-image.build=true)
quarkus.container-image.group=egripp/quarkus-native-template
quarkus.container-image.name=template-service
quarkus.container-image.tag=1.0.0
quarkus.container-image.build=false

# Logging
quarkus.log.category."com.example.template".level=INFO

# --- Profile: local (MySQL on localhost) ---
%local.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/db
%local.quarkus.datasource.jdbc.max-size=10
%local.quarkus.datasource.jdbc.min-size=5

# --- Profile: dev (docker-compose) ---
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://db-mysql:3306/db

# --- Profile: docker-local (app in container, DB on host) ---
%docker-local.quarkus.http.port=9091
%docker-local.quarkus.datasource.jdbc.url=jdbc:mysql://host.docker.internal:3306/db

# --- Profile: test (H2 in-memory) ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
